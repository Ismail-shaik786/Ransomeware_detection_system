name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Check formatting (black)
        run: black --check .

      - name: Lint (ruff)
        run: ruff check .

      - name: Syntax check all modules
        run: |
          python -m py_compile config.py
          python -m py_compile detector/entropy.py
          python -m py_compile detector/behavior.py
          python -m py_compile detector/monitor.py
          python -m py_compile detector/risk_engine.py
          python -m py_compile process/process_monitor.py
          python -m py_compile utils/helpers.py
          python -m py_compile utils/logger.py

      - name: Run tests
        run: pytest tests/ -v --tb=short
        if: hashFiles('tests/') != ''
